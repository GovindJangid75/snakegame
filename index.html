<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERPENT</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #060a0e;
            --card: rgba(10, 16, 22, 0.92);
            --accent: #00ffc8;
            --accent-dim: #00aa88;
            --food: #ff4757;
            --bonus: #ffd700;
            --text: #e0e6ec;
            --muted: #4a5a6a;
            --border: rgba(0, 255, 200, 0.12);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg);
            font-family: 'Space Grotesk', sans-serif;
            color: var(--text);
            overflow: hidden;
        }

        /* Animated background blobs */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(130px);
            opacity: 0.12;
            pointer-events: none;
            animation: blobDrift 22s ease-in-out infinite alternate;
        }
        .bg-blob:nth-child(1) { width: 480px; height: 480px; background: #00ffc8; top: -180px; left: -80px; }
        .bg-blob:nth-child(2) { width: 380px; height: 380px; background: #ff4757; bottom: -120px; right: -60px; animation-delay: -8s; }
        .bg-blob:nth-child(3) { width: 260px; height: 260px; background: #ff8c42; top: 45%; left: 55%; animation-delay: -15s; }

        @keyframes blobDrift {
            0%   { transform: translate(0, 0) scale(1); }
            33%  { transform: translate(40px, -30px) scale(1.08); }
            66%  { transform: translate(-25px, 35px) scale(0.93); }
            100% { transform: translate(15px, 15px) scale(1.04); }
        }

        /* Game container */
        .game-container {
            position: relative;
            width: 100%;
            max-width: 520px;
            background: var(--card);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 22px;
            box-shadow:
                0 0 80px rgba(0, 255, 200, 0.04),
                0 24px 64px rgba(0,0,0,0.55);
            z-index: 1;
        }

        /* Header */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }
        .game-title {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: 1.7rem;
            color: var(--accent);
            letter-spacing: 5px;
            text-shadow: 0 0 24px rgba(0,255,200,0.35);
        }
        .stats-row { display: flex; gap: 10px; }
        .stat-box {
            background: rgba(0,255,200,0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 5px 14px;
            text-align: center;
            min-width: 78px;
            transition: border-color 0.4s;
        }
        .stat-box.flash { border-color: var(--bonus); }
        .stat-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--muted);
            margin-bottom: 1px;
        }
        .stat-value {
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--accent);
            transition: transform 0.15s;
        }
        .stat-value.bump { transform: scale(1.2); }
        .stat-value.best-color { color: var(--food); }

        /* Canvas wrapper */
        .canvas-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
            animation: borderGlow 4s ease-in-out infinite;
        }
        @keyframes borderGlow {
            0%, 100% { border-color: rgba(0,255,200,0.12); }
            50%      { border-color: rgba(0,255,200,0.25); }
        }
        .canvas-wrap::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 14px;
            box-shadow: inset 0 0 40px rgba(0,255,200,0.03);
            pointer-events: none;
        }
        #gameCanvas { display: block; width: 100%; height: 100%; }

        /* Info bar */
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            gap: 8px;
        }
        .level-badge {
            font-family: 'Orbitron', monospace;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--accent);
            background: rgba(0,255,200,0.07);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 14px;
            letter-spacing: 2px;
        }
        .combo-display {
            font-family: 'Orbitron', monospace;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--bonus);
            opacity: 0;
            transition: opacity 0.25s, transform 0.25s;
            transform: scale(0.9);
        }
        .combo-display.active { opacity: 1; transform: scale(1); }
        .speed-bar-wrap { flex: 1; max-width: 110px; }
        .speed-label { font-size: 0.58rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 3px; }
        .speed-track { width: 100%; height: 4px; background: rgba(255,255,255,0.04); border-radius: 2px; overflow: hidden; }
        .speed-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--food)); border-radius: 2px; transition: width 0.4s ease; width: 18%; }

        /* Buttons */
        .controls { display: flex; justify-content: center; gap: 10px; margin-top: 14px; }
        .btn {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 10px 22px;
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.22s ease;
            background: rgba(0,255,200,0.06);
            color: var(--accent);
            letter-spacing: 0.5px;
            outline: none;
        }
        .btn:hover {
            background: rgba(0,255,200,0.14);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 6px 22px rgba(0,255,200,0.12);
        }
        .btn:active { transform: translateY(0); }
        .btn:focus-visible { box-shadow: 0 0 0 2px var(--accent); }
        .btn.primary {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
            font-weight: 700;
        }
        .btn.primary:hover { background: #33ffd6; box-shadow: 0 6px 28px rgba(0,255,200,0.25); }

        /* D-pad */
        .dpad {
            display: none;
            grid-template-areas: ". up ." "left . right" ". down .";
            grid-template-columns: 58px 58px 58px;
            grid-template-rows: 58px 58px 58px;
            gap: 6px;
            justify-content: center;
            margin-top: 14px;
        }
        .dpad-btn {
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,255,200,0.06);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--accent);
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.12s;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            outline: none;
        }
        .dpad-btn:active { background: rgba(0,255,200,0.22); transform: scale(0.9); }
        .dpad-btn.up { grid-area: up; }
        .dpad-btn.left { grid-area: left; }
        .dpad-btn.right { grid-area: right; }
        .dpad-btn.down { grid-area: down; }

        @media (max-width: 600px) {
            .dpad { display: grid; }
            .game-title { font-size: 1.3rem; letter-spacing: 3px; }
            .stat-box { min-width: 62px; padding: 4px 10px; }
            .stat-value { font-size: 0.88rem; }
            .game-container { padding: 14px; margin: 8px; border-radius: 18px; }
        }

        /* Instructions */
        .instructions {
            margin-top: 14px;
            padding: 10px 14px;
            background: rgba(255,255,255,0.015);
            border: 1px solid var(--border);
            border-radius: 10px;
            display: flex;
            gap: 18px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .inst { display: flex; align-items: center; gap: 7px; font-size: 0.78rem; color: var(--muted); }
        .inst i { color: var(--accent-dim); font-size: 0.85rem; }

        /* Overlays */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(6,10,14,0.92);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            border-radius: 22px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.45s ease;
        }
        .overlay.visible { opacity: 1; pointer-events: all; }
        .ov-title {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: 2.4rem;
            letter-spacing: 6px;
            margin-bottom: 6px;
        }
        .ov-title.accent { color: var(--accent); text-shadow: 0 0 32px rgba(0,255,200,0.45); }
        .ov-title.danger { color: var(--food); text-shadow: 0 0 32px rgba(255,71,87,0.45); }
        .ov-sub { font-size: 0.95rem; color: var(--muted); margin-bottom: 22px; letter-spacing: 0.5px; }
        .ov-stats { display: flex; gap: 28px; margin-bottom: 26px; }
        .ov-stat { text-align: center; }
        .ov-stat-val { font-family: 'Orbitron', monospace; font-size: 1.5rem; font-weight: 700; color: var(--accent); }
        .ov-stat-lbl { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-top: 3px; }
        .new-high {
            font-family: 'Orbitron', monospace;
            font-size: 0.75rem;
            color: var(--bonus);
            letter-spacing: 3px;
            margin-bottom: 14px;
            animation: highPulse 1s ease-in-out infinite;
        }
        @keyframes highPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
    </style>
</head>
<body>
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>

    <div class="game-container">
        <header class="game-header">
            <div class="game-title">SERPENT</div>
            <div class="stats-row">
                <div class="stat-box" id="score-box">
                    <div class="stat-label">Score</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat-box" id="best-box">
                    <div class="stat-label">Best</div>
                    <div class="stat-value best-color" id="high-score">0</div>
                </div>
            </div>
        </header>

        <div class="canvas-wrap">
            <canvas id="gameCanvas"></canvas>
        </div>

        <div class="info-bar">
            <div class="level-badge" id="level">LVL 1</div>
            <div class="combo-display" id="combo">COMBO x2</div>
            <div class="speed-bar-wrap">
                <div class="speed-label">Speed</div>
                <div class="speed-track"><div class="speed-fill" id="speed-fill"></div></div>
            </div>
        </div>

        <nav class="controls">
            <button class="btn primary" id="start-btn" aria-label="Start game"><i class="fas fa-play"></i> Start</button>
            <button class="btn" id="reset-btn" aria-label="Reset game"><i class="fas fa-rotate-right"></i> Reset</button>
        </nav>

        <div class="dpad" role="group" aria-label="Direction controls">
            <button class="dpad-btn up" data-dir="up" aria-label="Up"><i class="fas fa-chevron-up"></i></button>
            <button class="dpad-btn left" data-dir="left" aria-label="Left"><i class="fas fa-chevron-left"></i></button>
            <button class="dpad-btn right" data-dir="right" aria-label="Right"><i class="fas fa-chevron-right"></i></button>
            <button class="dpad-btn down" data-dir="down" aria-label="Down"><i class="fas fa-chevron-down"></i></button>
        </div>

        <div class="instructions">
            <div class="inst"><i class="fas fa-arrow-up-right-dots"></i> Arrows / WASD</div>
            <div class="inst"><i class="fas fa-apple-whole"></i> Eat to grow</div>
            <div class="inst"><i class="fas fa-star"></i> Gold = bonus</div>
            <div class="inst"><i class="fas fa-skull-crossbones"></i> Avoid walls & self</div>
        </div>

        <!-- Start overlay -->
        <div class="overlay visible" id="ov-start">
            <div class="ov-title accent">SERPENT</div>
            <div class="ov-sub">Press Start or Space to begin</div>
            <button class="btn primary" id="ov-start-btn"><i class="fas fa-play"></i> Play</button>
        </div>

        <!-- Pause overlay -->
        <div class="overlay" id="ov-pause">
            <div class="ov-title accent">PAUSED</div>
            <div class="ov-sub">Press Space or click to resume</div>
            <button class="btn primary" id="resume-btn"><i class="fas fa-play"></i> Resume</button>
        </div>

        <!-- Game Over overlay -->
        <div class="overlay" id="ov-over">
            <div class="ov-title danger">GAME OVER</div>
            <div class="ov-sub" id="go-sub">Better luck next time</div>
            <div class="new-high" id="new-high" style="display:none">NEW HIGH SCORE</div>
            <div class="ov-stats">
                <div class="ov-stat"><div class="ov-stat-val" id="f-score">0</div><div class="ov-stat-lbl">Score</div></div>
                <div class="ov-stat"><div class="ov-stat-val" id="f-level">1</div><div class="ov-stat-lbl">Level</div></div>
                <div class="ov-stat"><div class="ov-stat-val" id="f-length">3</div><div class="ov-stat-lbl">Length</div></div>
                <div class="ov-stat"><div class="ov-stat-val" id="f-combo">0</div><div class="ov-stat-lbl">Max Combo</div></div>
            </div>
            <button class="btn primary" id="restart-btn"><i class="fas fa-rotate-right"></i> Play Again</button>
        </div>
    </div>

    <script>
    (() => {
        /* ── Constants ── */
        const GRID = 20;
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        /* ── DOM Refs ── */
        const $score      = document.getElementById('score');
        const $high       = document.getElementById('high-score');
        const $level      = document.getElementById('level');
        const $combo      = document.getElementById('combo');
        const $speedFill  = document.getElementById('speed-fill');
        const $startBtn   = document.getElementById('start-btn');
        const $resetBtn   = document.getElementById('reset-btn');
        const $ovStart    = document.getElementById('ov-start');
        const $ovPause    = document.getElementById('ov-pause');
        const $ovOver     = document.getElementById('ov-over');
        const $ovStartBtn = document.getElementById('ov-start-btn');
        const $resumeBtn  = document.getElementById('resume-btn');
        const $restartBtn = document.getElementById('restart-btn');
        const $fScore     = document.getElementById('f-score');
        const $fLevel     = document.getElementById('f-level');
        const $fLength    = document.getElementById('f-length');
        const $fCombo     = document.getElementById('f-combo');
        const $newHigh    = document.getElementById('new-high');
        const $goSub      = document.getElementById('go-sub');
        const $scoreBox   = document.getElementById('score-box');
        const $bestBox    = document.getElementById('best-box');

        /* ── Audio ── */
        let audioCtx = null;
        function ensureAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        function tone(freq, dur, type = 'square', vol = 0.08) {
            if (!audioCtx) return;
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = type; o.frequency.value = freq;
            g.gain.value = vol;
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + dur);
        }
        function sfxEat()   { tone(660,0.08,'square',0.07); setTimeout(()=>tone(880,0.08,'square',0.05),45); }
        function sfxBonus() { tone(880,0.08,'sine',0.09); setTimeout(()=>tone(1100,0.08,'sine',0.07),55); setTimeout(()=>tone(1320,0.12,'sine',0.05),110); }
        function sfxDie()   { tone(380,0.14,'sawtooth',0.09); setTimeout(()=>tone(280,0.14,'sawtooth',0.07),90); setTimeout(()=>tone(180,0.28,'sawtooth',0.05),180); }
        function sfxLevel() { [660,880,1100,1320].forEach((f,i)=>setTimeout(()=>tone(f,0.09,'sine',0.06),i*55)); }

        /* ── State ── */
        let displaySize = 0;
        let snake, food, bonusFood;
        let dir, nextDir;
        let score, highScore, level;
        let baseSpeed, gameSpeed;
        let running, paused, dead;
        let lastTick, accum;
        let combo, comboTimer, maxCombo;
        let particles, trail, ambientDots;
        let shakeAmt, deathTime;
        let eatWave, eatWaveTimer;
        let foodSpawnTime;

        highScore = parseInt(localStorage.getItem('serpentHigh')) || 0;
        $high.textContent = highScore;

        /* ── Canvas Resize ── */
        function resize() {
            const r = canvas.getBoundingClientRect();
            displaySize = r.width;
            const dpr = window.devicePixelRatio || 1;
            canvas.width  = displaySize * dpr;
            canvas.height = displaySize * dpr;
        }
        window.addEventListener('resize', resize);

        /* ── Init ── */
        function init() {
            const m = Math.floor(GRID / 2);
            snake = [];
            for (let i = 0; i < 4; i++) snake.push({ x: m - i, y: m });
            dir = 'right'; nextDir = 'right';
            score = 0; level = 1;
            baseSpeed = 145; gameSpeed = baseSpeed;
            running = false; paused = false; dead = false;
            combo = 0; comboTimer = 0; maxCombo = 0;
            particles = []; trail = [];
            shakeAmt = 0; deathTime = 0;
            eatWave = -1; eatWaveTimer = 0;
            lastTick = 0; accum = 0;
            bonusFood = null;

            $score.textContent = '0';
            $level.textContent = 'LVL 1';
            $combo.classList.remove('active');
            $speedFill.style.width = '18%';

            // Ambient floating dots
            ambientDots = [];
            for (let i = 0; i < 35; i++) {
                ambientDots.push({
                    x: Math.random(), y: Math.random(),
                    vx: (Math.random() - 0.5) * 0.0004,
                    vy: (Math.random() - 0.5) * 0.0004,
                    r: 0.5 + Math.random() * 1.2,
                    a: 0.04 + Math.random() * 0.08
                });
            }

            spawnFood();
        }

        function spawnFood() {
            const occ = new Set(snake.map(s => s.x + ',' + s.y));
            if (bonusFood) occ.add(bonusFood.x + ',' + bonusFood.y);
            let p;
            do { p = { x: Math.floor(Math.random() * GRID), y: Math.floor(Math.random() * GRID) }; }
            while (occ.has(p.x + ',' + p.y));
            food = p;
            foodSpawnTime = performance.now();
        }

        function spawnBonus() {
            const occ = new Set(snake.map(s => s.x + ',' + s.y));
            occ.add(food.x + ',' + food.y);
            let p;
            do { p = { x: Math.floor(Math.random() * GRID), y: Math.floor(Math.random() * GRID) }; }
            while (occ.has(p.x + ',' + p.y));
            bonusFood = { x: p.x, y: p.y, life: 180 };
        }

        /* ── Particles ── */
        function emit(cx, cy, color, n = 14) {
            for (let i = 0; i < n; i++) {
                const a = (Math.PI * 2 / n) * i + Math.random() * 0.4;
                const sp = 1.2 + Math.random() * 2.8;
                particles.push({
                    x: cx, y: cy,
                    vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
                    life: 1, decay: 0.018 + Math.random() * 0.022,
                    sz: 2 + Math.random() * 3, color
                });
            }
        }

        /* ── Game Logic ── */
        function tick() {
            dir = nextDir;
            const head = { ...snake[0] };
            if (dir === 'up')    head.y--;
            if (dir === 'down')  head.y++;
            if (dir === 'left')  head.x--;
            if (dir === 'right') head.x++;

            // Wall check
            if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) { die(); return; }
            // Self check
            if (snake.some(s => s.x === head.x && s.y === head.y)) { die(); return; }

            // Trail from tail before it's removed
            snake.unshift(head);
            let ate = false;

            // Normal food
            if (head.x === food.x && head.y === food.y) {
                ate = true;
                comboTimer = 28;
                combo++;
                if (combo > maxCombo) maxCombo = combo;
                const mult = Math.min(combo, 5);
                const pts = 10 * mult;
                score += pts;
                $score.textContent = score;
                bumpStat($score, $scoreBox);

                const cs = displaySize / GRID;
                emit(food.x * cs + cs / 2, food.y * cs + cs / 2, '#ff4757', 16);
                sfxEat();
                eatWave = 0; eatWaveTimer = 0;

                // Level up
                const nl = Math.floor(score / 60) + 1;
                if (nl > level) {
                    level = nl;
                    $level.textContent = 'LVL ' + level;
                    gameSpeed = Math.max(48, baseSpeed - (level - 1) * 9);
                    $speedFill.style.width = Math.min(100, 18 + (level - 1) * 7) + '%';
                    sfxLevel();
                }
                // Chance for bonus
                if (!bonusFood && Math.random() < 0.22) spawnBonus();
                spawnFood();
            }

            // Bonus food
            if (bonusFood && head.x === bonusFood.x && head.y === bonusFood.y) {
                ate = true;
                score += 50;
                $score.textContent = score;
                bumpStat($score, $scoreBox);
                const cs = displaySize / GRID;
                emit(bonusFood.x * cs + cs / 2, bonusFood.y * cs + cs / 2, '#ffd700', 22);
                sfxBonus();
                bonusFood = null;
                eatWave = 0; eatWaveTimer = 0;
            }

            if (!ate) {
                const tail = snake.pop();
                trail.push({ x: tail.x, y: tail.y, a: 0.35 });
            }

            // Bonus food decay
            if (bonusFood) { bonusFood.life--; if (bonusFood.life <= 0) bonusFood = null; }

            // Combo decay
            if (comboTimer > 0) { comboTimer--; if (comboTimer === 0) combo = 0; }
            if (combo >= 2) { $combo.textContent = 'COMBO x' + Math.min(combo, 5); $combo.classList.add('active'); }
            else { $combo.classList.remove('active'); }

            // Eat wave
            if (eatWave >= 0) {
                eatWaveTimer++;
                if (eatWaveTimer % 2 === 0) eatWave++;
                if (eatWave >= snake.length) eatWave = -1;
            }
        }

        function die() {
            dead = true; running = false;
            deathTime = performance.now();
            shakeAmt = 16;
            sfxDie();
            let isNew = false;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('serpentHigh', highScore);
                $high.textContent = highScore;
                isNew = true;
                bumpStat($high, $bestBox);
            }
            setTimeout(() => {
                $fScore.textContent = score;
                $fLevel.textContent = level;
                $fLength.textContent = snake.length;
                $fCombo.textContent = maxCombo;
                $newHigh.style.display = isNew ? 'block' : 'none';
                $goSub.textContent = score >= 300 ? 'Incredible run!' : score >= 120 ? 'Solid effort!' : 'Better luck next time';
                $ovOver.classList.add('visible');
            }, 650);
            $startBtn.innerHTML = '<i class="fas fa-play"></i> Start';
        }

        function bumpStat(valEl, boxEl) {
            valEl.classList.add('bump');
            boxEl.classList.add('flash');
            setTimeout(() => { valEl.classList.remove('bump'); boxEl.classList.remove('flash'); }, 200);
        }

        /* ── Render ── */
        function render(ts) {
            requestAnimationFrame(render);
            const dpr = window.devicePixelRatio || 1;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            const sz = displaySize;
            if (sz <= 0) return;
            const cs = sz / GRID;

            // Tick
            if (running && !paused && !dead) {
                if (!lastTick) lastTick = ts;
                accum += ts - lastTick;
                lastTick = ts;
                while (accum >= gameSpeed) { tick(); accum -= gameSpeed; if (dead) break; }
            } else { lastTick = 0; accum = 0; }

            // Shake
            if (shakeAmt > 0.4) shakeAmt *= 0.9; else shakeAmt = 0;

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy;
                p.vx *= 0.95; p.vy *= 0.95;
                p.life -= p.decay;
                if (p.life <= 0) particles.splice(i, 1);
            }

            // Update trail
            for (let i = trail.length - 1; i >= 0; i--) {
                trail[i].a -= 0.02;
                if (trail[i].a <= 0) trail.splice(i, 1);
            }

            // Update ambient
            for (const d of ambientDots) {
                d.x += d.vx; d.y += d.vy;
                if (d.x < 0) d.x = 1; if (d.x > 1) d.x = 0;
                if (d.y < 0) d.y = 1; if (d.y > 1) d.y = 0;
            }

            ctx.save();
            if (shakeAmt > 0) ctx.translate((Math.random() - 0.5) * shakeAmt, (Math.random() - 0.5) * shakeAmt);

            // Background
            ctx.fillStyle = '#050910';
            ctx.fillRect(0, 0, sz, sz);

            // Ambient dots
            for (const d of ambientDots) {
                ctx.fillStyle = `rgba(0,255,200,${d.a})`;
                ctx.beginPath();
                ctx.arc(d.x * sz, d.y * sz, d.r, 0, Math.PI * 2);
                ctx.fill();
            }

            // Grid
            ctx.strokeStyle = 'rgba(0,255,200,0.025)';
            ctx.lineWidth = 0.5;
            for (let i = 1; i < GRID; i++) {
                ctx.beginPath(); ctx.moveTo(i * cs, 0); ctx.lineTo(i * cs, sz); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i * cs); ctx.lineTo(sz, i * cs); ctx.stroke();
            }

            // Trail
            for (const t of trail) {
                ctx.fillStyle = `rgba(0,255,200,${t.a * 0.25})`;
                const r = 3;
                roundRect(ctx, t.x * cs + 2, t.y * cs + 2, cs - 4, cs - 4, r);
                ctx.fill();
            }

            // Food
            if (food) {
                const fx = food.x * cs + cs / 2, fy = food.y * cs + cs / 2;
                const spawnAge = ts - (foodSpawnTime || ts);
                const spawnScale = Math.min(1, spawnAge / 180);
                const pulse = 1 + Math.sin(ts * 0.005) * 0.1;
                const fr = cs * 0.34 * pulse * spawnScale;

                ctx.save();
                ctx.shadowColor = '#ff4757'; ctx.shadowBlur = 18;
                ctx.fillStyle = '#ff4757';
                ctx.beginPath(); ctx.arc(fx, fy, Math.max(0.1, fr), 0, Math.PI * 2); ctx.fill();
                ctx.restore();
                // Highlight
                ctx.fillStyle = 'rgba(255,140,160,0.6)';
                ctx.beginPath(); ctx.arc(fx - fr * 0.22, fy - fr * 0.22, Math.max(0.1, fr * 0.28), 0, Math.PI * 2); ctx.fill();
            }

            // Bonus food
            if (bonusFood) {
                const bx = bonusFood.x * cs + cs / 2, by = bonusFood.y * cs + cs / 2;
                const pulse = 1 + Math.sin(ts * 0.007) * 0.14;
                const br = cs * 0.34 * pulse;
                const flicker = bonusFood.life < 45 ? (0.4 + 0.6 * Math.abs(Math.sin(ts * 0.02))) : 1;

                ctx.save();
                ctx.globalAlpha = flicker;
                ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 22;
                ctx.fillStyle = '#ffd700';
                ctx.beginPath(); ctx.arc(bx, by, Math.max(0.1, br), 0, Math.PI * 2); ctx.fill();
                ctx.restore();
                // Star highlight
                ctx.save(); ctx.globalAlpha = flicker;
                ctx.fillStyle = 'rgba(255,250,220,0.7)';
                ctx.beginPath(); ctx.arc(bx - br * 0.18, by - br * 0.18, Math.max(0.1, br * 0.22), 0, Math.PI * 2); ctx.fill();
                ctx.restore();

                // Rotating sparkle ring
                ctx.save(); ctx.globalAlpha = flicker * 0.35;
                ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 1;
                const sparkAngle = ts * 0.003;
                for (let i = 0; i < 4; i++) {
                    const sa = sparkAngle + (Math.PI / 2) * i;
                    const sx = bx + Math.cos(sa) * (br + 4);
                    const sy = by + Math.sin(sa) * (br + 4);
                    ctx.beginPath(); ctx.arc(sx, sy, 1.5, 0, Math.PI * 2); ctx.stroke();
                }
                ctx.restore();
            }

            // Snake
            const len = snake.length;
            for (let i = len - 1; i >= 0; i--) {
                const seg = snake[i];
                const x = seg.x * cs, y = seg.y * cs;
                const t = len > 1 ? i / (len - 1) : 0;
                const h = 162, s = 100 - t * 42, l = 52 - t * 26;

                // Eat wave brightness boost
                let boost = 0;
                if (eatWave >= 0 && i === eatWave) boost = 18;

                ctx.save();
                if (i === 0) {
                    ctx.shadowColor = '#00ffc8'; ctx.shadowBlur = 14;
                    ctx.fillStyle = `hsl(${h},100%,${58 + boost}%)`;
                } else {
                    ctx.shadowColor = `hsl(${h},${s}%,${l}%)`; ctx.shadowBlur = 5;
                    ctx.fillStyle = `hsl(${h},${s}%,${l + boost}%)`;
                }

                const pad = 1.2, rad = 5;
                roundRect(ctx, x + pad, y + pad, cs - pad * 2, cs - pad * 2, rad);
                ctx.fill();
                ctx.restore();

                // Eyes on head
                if (i === 0) {
                    const cx = x + cs / 2, cy = y + cs / 2;
                    const eo = cs * 0.22, esz = cs * 0.12, psz = cs * 0.055;
                    let e1x, e1y, e2x, e2y, p1x, p1y, p2x, p2y;
                    if (dir === 'right')     { e1x=cx+eo*0.4; e1y=cy-eo; e2x=cx+eo*0.4; e2y=cy+eo; p1x=e1x+psz; p1y=e1y; p2x=e2x+psz; p2y=e2y; }
                    else if (dir === 'left') { e1x=cx-eo*0.4; e1y=cy-eo; e2x=cx-eo*0.4; e2y=cy+eo; p1x=e1x-psz; p1y=e1y; p2x=e2x-psz; p2y=e2y; }
                    else if (dir === 'up')   { e1x=cx-eo; e1y=cy-eo*0.4; e2x=cx+eo; e2y=cy-eo*0.4; p1x=e1x; p1y=e1y-psz; p2x=e2x; p2y=e2y-psz; }
                    else                     { e1x=cx-eo; e1y=cy+eo*0.4; e2x=cx+eo; e2y=cy+eo*0.4; p1x=e1x; p1y=e1y+psz; p2x=e2x; p2y=e2y+psz; }

                    ctx.fillStyle = '#fff';
                    ctx.beginPath(); ctx.arc(e1x, e1y, esz, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(e2x, e2y, esz, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#050910';
                    ctx.beginPath(); ctx.arc(p1x, p1y, psz, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(p2x, p2y, psz, 0, Math.PI*2); ctx.fill();
                }
            }

            // Particles
            for (const p of particles) {
                ctx.save();
                ctx.globalAlpha = p.life;
                ctx.shadowColor = p.color; ctx.shadowBlur = 8;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.1, p.sz * p.life), 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }

            // Vignette
            const vig = ctx.createRadialGradient(sz/2, sz/2, sz*0.28, sz/2, sz/2, sz*0.72);
            vig.addColorStop(0, 'rgba(0,0,0,0)');
            vig.addColorStop(1, 'rgba(0,0,0,0.35)');
            ctx.fillStyle = vig;
            ctx.fillRect(0, 0, sz, sz);

            // Death flash
            if (dead && shakeAmt > 1.5) {
                ctx.fillStyle = `rgba(255,71,87,${Math.min(0.3, shakeAmt / 40)})`;
                ctx.fillRect(0, 0, sz, sz);
            }

            ctx.restore();
        }

        function roundRect(c, x, y, w, h, r) {
            c.beginPath();
            c.moveTo(x + r, y);
            c.lineTo(x + w - r, y);
            c.quadraticCurveTo(x + w, y, x + w, y + r);
            c.lineTo(x + w, y + h - r);
            c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            c.lineTo(x + r, y + h);
            c.quadraticCurveTo(x, y + h, x, y + h - r);
            c.lineTo(x, y + r);
            c.quadraticCurveTo(x, y, x + r, y);
            c.closePath();
        }

        /* ── Direction ── */
        const opp = { up:'down', down:'up', left:'right', right:'left' };
        function setDir(d) { if (d !== opp[dir]) nextDir = d; }

        /* ── Controls ── */
        const keyMap = {
            ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right',
            w:'up', s:'down', a:'left', d:'right', W:'up', S:'down', A:'left', D:'right'
        };
        document.addEventListener('keydown', e => {
            if (e.key === ' ' || e.key === 'Spacebar') {
                e.preventDefault();
                if (!running && !dead) startGame();
                else if (running && !paused) pauseGame();
                else if (running && paused) resumeGame();
                else if (dead) { init(); startGame(); }
                return;
            }
            if (keyMap[e.key]) { e.preventDefault(); if (running && !paused) setDir(keyMap[e.key]); }
        });

        // D-pad
        document.querySelectorAll('.dpad-btn').forEach(b => {
            b.addEventListener('click', () => { if (running && !paused) setDir(b.dataset.dir); });
        });

        // Touch swipe on canvas
        let tx0 = 0, ty0 = 0;
        canvas.addEventListener('touchstart', e => { tx0 = e.touches[0].clientX; ty0 = e.touches[0].clientY; }, { passive: true });
        canvas.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - tx0, dy = e.changedTouches[0].clientY - ty0;
            if (Math.abs(dx) < 18 && Math.abs(dy) < 18) return;
            if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 'right' : 'left');
            else setDir(dy > 0 ? 'down' : 'up');
        }, { passive: true });

        /* ── Game Flow ── */
        function startGame() {
            ensureAudio();
            if (dead) init();
            running = true; paused = false;
            lastTick = 0; accum = 0;
            $ovStart.classList.remove('visible');
            $ovOver.classList.remove('visible');
            $ovPause.classList.remove('visible');
            $startBtn.innerHTML = '<i class="fas fa-pause"></i> Pause';
        }
        function pauseGame() {
            paused = true;
            $ovPause.classList.add('visible');
            $startBtn.innerHTML = '<i class="fas fa-play"></i> Resume';
        }
        function resumeGame() {
            paused = false; lastTick = 0; accum = 0;
            $ovPause.classList.remove('visible');
            $startBtn.innerHTML = '<i class="fas fa-pause"></i> Pause';
        }
        function resetGame() {
            running = false; paused = false; dead = false;
            init();
            $ovStart.classList.add('visible');
            $ovPause.classList.remove('visible');
            $ovOver.classList.remove('visible');
            $startBtn.innerHTML = '<i class="fas fa-play"></i> Start';
        }

        $startBtn.addEventListener('click', () => {
            if (!running && !dead) startGame();
            else if (running && !paused) pauseGame();
            else if (running && paused) resumeGame();
            else if (dead) { init(); startGame(); }
        });
        $resetBtn.addEventListener('click', resetGame);
        $ovStartBtn.addEventListener('click', startGame);
        $resumeBtn.addEventListener('click', resumeGame);
        $restartBtn.addEventListener('click', () => { init(); startGame(); });

        /* ── Boot ── */
        resize();
        init();
        requestAnimationFrame(render);
    })();
    </script>
</body>
</html>
